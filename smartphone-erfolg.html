<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig fürs iPad: Verhindert automatisches Zoomen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smartphone – EduBreakout</title>
    <link rel="stylesheet" href="smartphone-style.css">
</head>
<body>

    <!-- Zurück-Button zum Hauptraum (schwebend) -->
    <a href="index.html" class="back-btn">⬅ Zurück zum Raum</a>

    <!-- Das Smartphone-Gehäuse -->
    <div class="phone-frame">
        
        <!-- Die obere Notch/Kamera-Insel für den echten Smartphone-Look -->
        <div class="phone-notch"></div>
        
        <!-- Der Bildschirmbereich mit deinem WhatsApp-Bild -->
        <div class="phone-screen">
            <img src="WhatsApp-Chat.jpg" alt="WhatsApp Chat" class="chat-image">
            
            <!-- Unsichtbarer Hotspot direkt AUF dem Handy-Bildschirm -->
            <!-- Öffnet sich automatisch in einem neuen Tab (target="_blank") -->
            <a href="https://learningapps.org/view48536102" target="_blank" class="phone-hotspot" id="chat-link" title="Link öffnen"></a>
        </div>
        
        <!-- Der Home-Button-Strich am unteren Rand -->
        <div class="phone-bottom-bar"></div>
    </div>

</body>
</html>
