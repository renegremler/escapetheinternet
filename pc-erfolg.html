<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig fürs iPad: Verhindert automatisches Zoomen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Posteingang – EduBreakout</title>
    <link rel="stylesheet" href="pc-erfolg-style.css">
</head>
<body>

    <!-- Die E-Mail-App Oberfläche -->
    <div class="mail-app">
        
        <!-- Die obere Menüleiste der App -->
        <header class="mail-header">
            <a href="index.html" class="back-btn">⬅ Zum Hauptraum</a>
            <div class="app-title">Mail</div>
            <div class="spacer"></div>
        </header>

        <!-- Der Inhalt der geöffneten E-Mail -->
        <main class="mail-container">
            
            <!-- Betreff-Zeile -->
            <h1 class="mail-subject">Infos über Suchmaschinen</h1>

            <!-- Absender- und Empfänger-Daten -->
            <div class="mail-meta">
                <div class="avatar">A</div>
                <div class="meta-text">
                    <div class="sender"><strong>Anonym</strong> &lt;info@suchmaschinen-archiv.de&gt;</div>
                    <div class="receiver">An: Tim Berners-Lee</div>
                </div>
                <div class="mail-date">Heute</div>
            </div>

            <!-- Der eigentliche Text der E-Mail -->
            <article class="mail-body">
                <p>Hi Tim,</p>
                
                <p>du hattest mich nach weiteren Informationen über Suchmaschinen gefragt. Schau <a href="https://www.learningsnacks.de/share/588353/" target="_blank" class="secret-link">hier</a> mal nach.</p>
                
                <p>Liebe Grüße</p>
            </article>

        </main>
    </div>

</body>
</html>
