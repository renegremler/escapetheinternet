<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig fürs iPad: Verhindert automatisches Zoomen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tablet Inhalt – EduBreakout</title>
    <link rel="stylesheet" href="tablet-erfolg-style.css">
</head>
<body>

    <!-- Zurück-Button zum Hauptraum (schwebend oben links) -->
    <a href="index.html" class="back-btn">⬅ Zurück zum Raum</a>

    <!-- Das Tablet-Gehäuse (Querformat) -->
    <div class="tablet-frame">
        
        <!-- Die Frontkamera des Tablets am oberen Rand -->
        <div class="tablet-camera"></div>
        
        <!-- Der Bildschirmbereich mit deinem Instagram-Bild -->
        <div class="tablet-screen">
            <img src="Instagram_Suchmaschine.jpg" alt="Instagram Suchmaschine" class="instagram-image">
            
            <!-- Unsichtbarer Hotspot direkt AUF dem Tablet-Bildschirm -->
            <!-- Öffnet sich in einem neuen Tab (target="_blank") -->
            <a href="https://www.learningsnacks.de/share/588353/5586da344966627705517aa5cd02cb85fd1d4925" target="_blank" class="tablet-hotspot" id="instagram-link" title="Link öffnen"></a>
        </div>
        
        <!-- Der Home-Strich am unteren Rand (typisch für moderne Tablets) -->
        <div class="tablet-bottom-bar"></div>
    </div>

</body>
</html>
