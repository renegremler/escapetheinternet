<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig fürs iPad: Verhindert automatisches Zoomen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laptop Inhalt – EduBreakout</title>
    <link rel="stylesheet" href="laptop-erfolg-style.css">
</head>
<body>

    <!-- Zurück-Button zum Hauptraum (schwebend oben links) -->
    <a href="index.html" class="back-btn">⬅ Zurück zum Raum</a>

    <!-- Das Laptop-Gehäuse -->
    <div class="laptop-frame">
        
        <!-- Der Bildschirmbereich mit deinem Browser-Bild -->
        <div class="laptop-screen">
            <img src="Internetseite_Suchmaschine_Browser.jpg" alt="Suchmaschine Browser" class="browser-image">
            
            <!-- Unsichtbarer Hotspot direkt AUF dem Laptop-Bildschirm -->
            <!-- Öffnet sich in einem neuen Tab (target="_blank") -->
            <a href="https://learningapps.org/watch?v=pvo5zpqsc26" target="_blank" class="laptop-hotspot" id="browser-link" title="Link öffnen"></a>
        </div>
        
        <!-- Das untere Gehäuseteil (Tastatur-Base-Ansatz für den Laptop-Look) -->
        <div class="laptop-base"></div>
    </div>

</body>
</html>
