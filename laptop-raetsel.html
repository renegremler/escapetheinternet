<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig fürs iPad: Verhindert automatisches Zoomen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laptop Anmeldung – EduBreakout</title>
    <!-- Verwendet das exakt gleiche Design wie die PC-Seite -->
    <link rel="stylesheet" href="pc-style.css">
</head>
<body>

    <!-- Hintergrund mit Weichzeichner -->
    <div class="login-background"></div>

    <!-- Die Anmeldeseite -->
    <div class="login-container">
        
        <!-- Zurück-Button zum Hauptraum -->
        <a href="index.html" class="back-button">⬅ Zurück zum Raum</a>

        <!-- Profilbild -->
        <div class="profile-pic">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>

        <!-- Benutzername (Gesperrt) -->
        <div class="username">Tim Berners-Lee</div>

        <!-- Anmeldeformular -->
        <form id="loginForm" onsubmit="checkPassword(event)">
            <input type="password" id="passwordInput" placeholder="Passwort eingeben" required autocomplete="off">
            <button type="submit" class="submit-btn">Anmelden</button>
        </form>

        <!-- Fehlermeldung (standardmäßig unsichtbar) -->
        <div id="errorMessage" class="error-msg">Falsches Passwort! Versuche es noch einmal.</div>

    </div>

    <!-- JavaScript für die sichere Passwortprüfung (Drei erlaubte Varianten) -->
    <script>
        // Funktion zur Umwandlung in einen sicheren SHA-256 Code
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);                    
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword(event) {
            event.preventDefault(); // Verhindert das Neuladen der Seite
            
            // Eingabe holen, Leerzeichen vorn/hinten entfernen und in Kleinbuchstaben umwandeln
            const input = document.getElementById('passwordInput').value.trim().toLowerCase();
            const errorDiv = document.getElementById('errorMessage');
            
            // Das sind die drei gültigen Hashes für die kleingeschriebenen Varianten:
            const validHashes = [
            "4dd4f3835505cd95950fc062a9b9418958b2d820eb07ef5d545f7c99de091e3b", // "alphabet"
            "1edce49006aa62dbb5214608bc8163f6ce1ffeb630465325016716045f26ff8c", // "alphabet inc."
            "9e5f7bf477af4d76ad449c9a9af6e9e50bcbb1bf8bb49f0f45979c9caa12c129"  // "alphabet inc"
            ];
            
            // Berechne den Hash der Schülereingabe
            const inputHash = await sha256(input);

            // Prüfen, ob der berechnete Hash in der Liste der erlaubten Hashes existiert
            if (validHashes.includes(inputHash)) {
                // Passwort ist richtig! Weiterleitung zur nächsten Seite
                window.location.href = "laptop-erfolg.html"; 
            } else {
                // Passwort ist falsch! Zeige die rote Meldung an
                errorDiv.style.display = "block";
                document.getElementById('passwordInput').value = ""; // Feld leeren
            }
        }
    </script>
</body>
</html>
